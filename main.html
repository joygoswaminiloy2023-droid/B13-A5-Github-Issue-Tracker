<body class="geist bg-[#F8FAFC]">
    <header>
<!-- navbar -->
    <div class="navbar bg-base-100 shadow-sm px-4 bg-white">
    <div class="flex-1 flex items-center gap-2">
      <img src="./assets/github-logo.png" alt="GitHub Logo" class="w-10 h-10">
      <h1 class="text-2xl font-bold">GitHub Issues Tracker</h1>
    </div>
    <div class="flex items-center gap-3">
      <div class="relative">
        <input type="search" placeholder="Search issues"
               class="input input-bordered pl-10 pr-4 w-64 rounded-lg" />
        <svg class="w-5 h-5 absolute left-3 top-1/2 -translate-y-1/2 opacity-50 text-gray-500" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor">
          <circle cx="11" cy="11" r="8" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
          <path d="M21 21l-4.3-4.3" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </div>
      <div class="dropdown dropdown-end">
        <label tabindex="0" class="btn bg-primary text-white whitespace-nowrap">
          New Issue <i class="fa-solid fa-plus ml-1"></i>
        </label>
        <ul tabindex="-1" class="menu menu-sm dropdown-content bg-base-100 rounded-box shadow mt-2 w-52 p-2">
          <li><a class="justify-between"><span>New Issue</span><span class="badge">New</span></a></li>
          <li><a>Settings</a></li>
          <li><a>Logout</a></li>
        </ul>
      </div>
    </div>
  </div>
</header>

<main class="max-w-11/12 m-auto">
<!-- buttons -->

<div class="my-20 bg-white p-5 shadow-lg m-auto ">
<button id="all_btn" class="btn btn-primary px-6 py-3 font-normal ">All</button>
<button class="btn px-6 py-3 font-normal text-black">Open</button>
<button class="btn px-6 py-3 font-normal text-black">Closed</button>
</div>

<!-- isseus heading -->
 <div class="mt-20 bg-white p-5 shadow-lg m-auto flex items-center justify-between gap-5 rounded-lg">
  <div class="w-13 h-13 rounded-full bg-[#ECE4FF] flex items-center justify-center">
    <img src="./assets/Aperture.png" alt="" class="w-6 h-6">
  </div>

  <div class="flex-1">
    <h1 class="font-semibold text-2xl">50 Issues</h1>
    <p class="text-[#64748B]">Track and manage your project issues</p>
  </div>

  <div class="flex gap-2 items-center">
    <i class="fa-solid fa-circle text-green-400 text-sm"></i>
    <span>Open</span>
  </div>

  <div class="flex gap-2 items-center">
    <i class="fa-solid fa-circle text-[#A855F7] text-sm"></i>
    <span>Closed</span>
  </div>
</div>
