<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
<!-- links -->
 <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
<script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

<link rel="stylesheet" href="./style.css">
<!-- font & font-awesome -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&family=Outfit:wght@100..900&family=Playfair+Display:ital,wght@0,400..900;1,400..900&family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&family=Quattrocento+Sans:ital,wght@0,400;0,700;1,400;1,700&family=Tiro+Bangla:ital@0;1&family=Work+Sans:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">

</head>
<body class="geist flex items-center justify-center min-h-screen bg-gray-100">

   
  <div class="w-full max-w-md p-8 bg-white border border-gray-300 rounded-xl shadow-xl ">
    <header class="text-center mb-6">
      <img src="./assets/github-logo.png" alt="GitHub Logo" class="w-16 h-16 mx-auto mb-4">
      <h1 class="text-2xl font-bold">GitHub Issues Tracker</h1>
      <p class="text-gray-500 mt-2 font-semibold">Sign in to manage your issues</p>
    </header>

  
    <fieldset class="fieldset">
    <legend class="fieldset-legend">Username</legend>
    <input id="username" type="text"  class="input w-full" placeholder="Enter your username" autocomplete="off"/>
    <p class="text-sm text-primary mt-1">Default: admin</p>
</fieldset>

      <fieldset class="fieldset">
        <legend class="fieldset-legend">Password</legend>
        <input id="password" type="password"  class="input w-full" placeholder="Enter your password" />
        <p class="text-sm text-primary mt-1">Default: admin123</p>
      </fieldset>

      <button  onclick="signin()" class="btn btn-primary w-full">Sign In</button>
    
  </div>
    

    <script src="./sign_in.js"></script>
    <script src="./script.js"></script>
</body>
</html>
